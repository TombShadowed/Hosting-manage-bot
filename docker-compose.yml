version: '3.8'
services:
  hosting-bot:
    build: .
    environment:
      - TELEGRAM_TOKEN
      - TELEGRAM_API_ID
      - TELEGRAM_API_HASH
      - OWNER_ID
      - MONGO_URI
      - BASE_DATA_DIR=/mnt/data/bots
    volumes:
      - ./mnt/data/bots:/mnt/data/bots
    restart: unless-stopped
